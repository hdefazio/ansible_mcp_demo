---
name: Linters

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ansible-lint

      - name: Run black on Python files
        run: black --check plugins/

      - name: Run ansible-lint on playbooks
        run: ansible-lint playbooks/
