---
# ============================================================================
# Filter PRs (Combined: Real Activity + Whale Shark Comment Recency)
# ============================================================================
# Input: pr_list, pr_details_map, pr_comments
# Output: prs_to_comment, pr_activity_map

- name: DEBUG - Show pr_comments structure
  ansible.builtin.debug:
    msg:
      - "pr_comments.results length: {{ pr_comments.results | length }}"
      - "First result keys: {{ pr_comments.results[0].keys() | list if pr_comments.results | length > 0 else 'N/A' }}"
      - "First result item: {{ pr_comments.results[0].item if pr_comments.results | length > 0 else 'N/A' }}"
      - "First result item.number: {{ pr_comments.results[0].item.number if pr_comments.results | length > 0 else 'N/A' }}"
      - "First result item.number type: {{ pr_comments.results[0].item.number | type_debug if pr_comments.results | length > 0 else 'N/A' }}"
  when: has_prs

- name: DEBUG - Show pr_number and matching
  ansible.builtin.debug:
    msg:
      - "PR #{{ pr_number }} (type: {{ pr_number | type_debug }})"
      - "Looking for comments with item.number == {{ pr_number }}"
      - "Available comment PR numbers: {{ pr_comments.results | map(attribute='item.number') | list }}"
      - "Match found: {{ pr_comments.results | selectattr('item.number', 'equalto', pr_number) | list | length > 0 }}"
  loop: "{{ pr_list.get('items', []) }}"
  loop_control:
    loop_var: pr_item
    label: "PR #{{ pr_item.number }}"
  when:
    - has_prs
    - pr_item.number | int in pr_details_map
  vars:
    pr_number: "{{ pr_item.number | int }}"

- name: DEBUG - Show filter decision
  ansible.builtin.debug:
    msg:
      - "PR #{{ pr_number }}:"
      - "  created_at: {{ created_date }}"
      - "  updated_at: {{ updated_date }}"
      - "  last_non_whale_comment: {{ last_non_whale_comment_date }}"
      - "  last_real_activity: {{ last_real_activity }}"
      - "  days_since_creation: {{ days_since_creation }}"
      - "  days_since_activity: {{ days_since_activity }}"
      - "  days_since_whale_shark: {{ days_since_whale_shark }}"
      - "  meets_activity ({{ days_since_activity }} >= {{ days_last_activity_threshold }}): {{ meets_activity_threshold }}"
      - "  meets_whale_shark ({{ days_since_whale_shark }} >= {{ comment_freshness_days }}): {{ meets_whale_shark_threshold }}"
      - "  INCLUDE: {{ include_pr }}"
  loop: "{{ pr_list.get('items', []) }}"
  loop_control:
    loop_var: pr_item
    label: "PR #{{ pr_item.number }}"
  when:
    - has_prs
    - pr_item.number | string in pr_details_map
  vars:
    pr_number: "{{ pr_item.number }}"
    created_date: "{{ pr_details_map[pr_number].created_at }}"

    all_comments: >-
      {{ pr_comments.results |
      selectattr('item.number', 'equalto', pr_number | int) |
      map(attribute='content') | first | parse_mcp_json }}

    whale_shark_comments: >-
      {{ all_comments |
      selectattr('body', 'search', '🦈.*Whale Shark PR Migration Status') |
      list }}
    non_whale_shark_comments: >-
      {{ all_comments |
      rejectattr('body', 'search', '🦈.*Whale Shark PR Migration Status') |
      list }}

    last_non_whale_comment_date: >-
      {{ (non_whale_shark_comments |
      sort(attribute='created_at', reverse=true) |
      first).created_at if non_whale_shark_comments | length > 0
      else created_date }}
    updated_date: >-
      {{ pr_details_map[pr_number].updated_at }}
    last_real_activity: >-
      {{ [updated_date, last_non_whale_comment_date] | max }}

    last_whale_shark_date: >-
      {{ (whale_shark_comments |
      sort(attribute='created_at', reverse=true) |
      first).created_at if whale_shark_comments | length > 0
      else '' }}

    days_since_creation: >-
      {{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d "' +
      created_date + '" +%s) ) / 86400 ))') }}
    days_since_activity: >-
      {{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d "' +
      last_real_activity + '" +%s) ) / 86400 ))') }}
    days_since_whale_shark: >-
      {{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d "' +
      last_whale_shark_date + '" +%s) ) / 86400 ))')
      if last_whale_shark_date else 999 }}

    meets_activity_threshold: >-
      {{ days_since_activity | int >= days_last_activity_threshold }}
    meets_whale_shark_threshold: >-
      {{ whale_shark_comments | length == 0 or
      days_since_whale_shark | int >= comment_freshness_days }}
    include_pr: >-
      {{ meets_activity_threshold and meets_whale_shark_threshold }}

- name: Calculate activity and filter PRs
  ansible.builtin.set_fact:
    pr_activity_map: >-
      {{ pr_activity_map | default({}) |
      combine({pr_number | string: activity_data}) }}
    prs_to_comment_temp: >-
      {{ prs_to_comment_temp | default([]) +
      ([pr_number] if include_pr else []) }}
  loop: "{{ pr_list.get('items', []) }}"
  loop_control:
    loop_var: pr_item
    label: "PR #{{ pr_item.number }}"
  when:
    - has_prs
    - pr_item.number | string in pr_details_map
  vars:
    pr_number: "{{ pr_item.number }}"
    created_date: "{{ pr_details_map[pr_number].created_at }}"

    # Get all comments for this PR
    all_comments: >-
      {{ pr_comments.results |
      selectattr('item.number', 'equalto', pr_number | int) |
      map(attribute='content') | first | parse_mcp_json }}

    # Filter whale shark vs non-whale shark comments
    whale_shark_comments: >-
      {{ all_comments |
      selectattr('body', 'search', '🦈.*Whale Shark PR Migration Status') |
      list }}
    non_whale_shark_comments: >-
      {{ all_comments |
      rejectattr('body', 'search', '🦈.*Whale Shark PR Migration Status') |
      list }}

    # Calculate last real activity
    last_non_whale_comment_date: >-
      {{ (non_whale_shark_comments |
      sort(attribute='created_at', reverse=true) |
      first).created_at if non_whale_shark_comments | length > 0
      else created_date }}
    updated_date: >-
      {{ pr_details_map[pr_number].updated_at }}
    last_real_activity: >-
      {{ [updated_date, last_non_whale_comment_date] | max }}

    # Calculate whale shark comment recency
    last_whale_shark_date: >-
      {{ (whale_shark_comments |
      sort(attribute='created_at', reverse=true) |
      first).created_at if whale_shark_comments | length > 0
      else '' }}

    # Calculate days
    days_since_creation: >-
      {{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d "' +
      created_date + '" +%s) ) / 86400 ))') }}
    days_since_activity: >-
      {{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d "' +
      last_real_activity + '" +%s) ) / 86400 ))') }}
    days_since_whale_shark: >-
      {{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d "' +
      last_whale_shark_date + '" +%s) ) / 86400 ))')
      if last_whale_shark_date else 999 }}

    # Determine if we should include this PR
    meets_activity_threshold: >-
      {{ days_since_activity | int >= days_last_activity_threshold }}
    meets_whale_shark_threshold: >-
      {{ whale_shark_comments | length == 0 or
      days_since_whale_shark | int >= comment_freshness_days }}
    include_pr: >-
      {{ meets_activity_threshold and meets_whale_shark_threshold }}

    activity_data:
      created_at: "{{ created_date }}"
      last_real_activity: "{{ last_real_activity }}"
      days_since_creation: "{{ days_since_creation }}"
      days_since_activity: "{{ days_since_activity }}"

- name: Set final prs_to_comment list
  ansible.builtin.set_fact:
    prs_to_comment: "{{ prs_to_comment_temp | default([]) }}"
    has_prs_to_comment: >-
      {{ prs_to_comment_temp is defined and
      prs_to_comment_temp | length > 0 }}

- name: Display filtered PRs
  ansible.builtin.debug:
    msg: >-
      🦈 {{ prs_to_comment | default([]) | length }} PR(s) to comment on
      (real activity {{ days_last_activity_threshold }}+ days ago,
      no whale shark comment in {{ comment_freshness_days }}+ days)
  when: has_prs
