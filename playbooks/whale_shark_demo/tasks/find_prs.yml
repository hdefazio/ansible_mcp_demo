---
# ============================================================================
# Find PRs Adrift (Search for stale pull requests)
# ============================================================================
- name: Find PRs adrift using GitHub MCP
  ansible.mcp.run_tool:
    name: search_pull_requests
    args:
      query: >-
        repo:{{ repo_owner }}/{{ repo_name }}
        is:pr is:open -is:draft
        created:<={{ created_threshold_date }}
        updated:<={{ last_activity_threshold_date }}
  delegate_to: github-mcp-server
  register: adrift_prs

- name: Parse PR results
  ansible.builtin.set_fact:
    pr_list: "{{ adrift_prs.content | default([]) | parse_mcp_json }}"

- name: Check if PRs were found
  ansible.builtin.set_fact:
    has_prs: "{{ pr_list.get('items', []) | length > 0 }}"

- name: Display PRs adrift
  ansible.builtin.debug:
    msg: >-
      🦈 {{ pr_list.get('items', []) | length }} PR(s) found
      (created {{ days_created_threshold }}+ days ago,
      updated {{ days_last_activity_threshold }}+ days ago)
