---
# ============================================================================
# Get PR Details, Commits, and Comments
# ============================================================================
# Input: pr_list
# Output: pr_details_map, pr_commits_map, pr_comments_map

- name: Get detailed PR information using GitHub MCP
  ansible.mcp.run_tool:
    name: pull_request_read
    args: >-
      {{ {'method': 'get', 'owner': repo_owner,
      'repo': repo_name, 'pullNumber': item.number} }}
  delegate_to: github-mcp-server
  loop: "{{ pr_list.get('items', []) }}"
  loop_control:
    label: "PR #{{ item.number }}"
  register: pr_details
  when: has_prs

- name: Parse detailed PR results
  ansible.builtin.set_fact:
    pr_details_map: >-
      {{ pr_details_map | default({}) |
      combine({item.item.number | string: item.content | parse_mcp_json}) }}
  loop: "{{ pr_details.results | default([]) }}"
  loop_control:
    label: "PR #{{ item.item.number }}"
  when: pr_details is defined and not item.failed | default(false)

- name: Get PR commits using GitHub MCP
  ansible.mcp.run_tool:
    name: list_commits
    args: >-
      {{ {'owner': repo_owner, 'repo': repo_name,
      'sha': pr_details_map[pr_number].head.ref} }}
  delegate_to: github-mcp-server
  loop: "{{ pr_list.get('items', []) }}"
  loop_control:
    label: "PR #{{ item.number }}"
  register: pr_commits_list
  vars:
    pr_number: "{{ item.number | string }}"
  when:
    - has_prs
    - pr_number in pr_details_map
    - pr_details_map[pr_number].head is defined
    - pr_details_map[pr_number].head.ref is defined

- name: Build commits lookup map
  ansible.builtin.set_fact:
    pr_commits_map: >-
      {{ pr_commits_map | default({}) |
      combine({item.item.number | string: item.content | parse_mcp_json}) }}
  loop: "{{ pr_commits_list.results | default([]) }}"
  loop_control:
    label: "PR #{{ item.item.number }}"
  when:
    - pr_commits_list is defined
    - not item.failed | default(false)

- name: Get PR comments using GitHub MCP
  ansible.mcp.run_tool:
    name: pull_request_read
    args: >-
      {{ {'method': 'get_comments', 'owner': repo_owner,
      'repo': repo_name, 'pullNumber': item.number} }}
  delegate_to: github-mcp-server
  loop: "{{ pr_list.get('items', []) }}"
  loop_control:
    label: "PR #{{ item.number }}"
  register: pr_comments
  vars:
    pr_number: "{{ item.number | string }}"
  when:
    - has_prs
    - pr_number in pr_details_map

- name: Build comments lookup map
  ansible.builtin.set_fact:
    pr_comments_map: >-
      {{ pr_comments_map | default({}) |
      combine({item.item.number | string: item.content | parse_mcp_json}) }}
  loop: "{{ pr_comments.results | default([]) }}"
  loop_control:
    label: "PR #{{ item.item.number }}"
  when:
    - pr_comments is defined
    - not item.failed | default(false)
