---
- name: Whale Shark PR Migration Tracker
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars.yml

  tasks:
    - name: Find PRs adrift
      ansible.builtin.include_tasks: tasks/find_prs.yml

    - name: Check for existing comments
      ansible.builtin.include_tasks: tasks/check_comments.yml

    # ============================================================================
    # Get Detailed PR Information (including CI status)
    # ============================================================================
    - name: Get detailed PR information using GitHub MCP
      ansible.mcp.run_tool:
        name: pull_request_read
        args: >-
          {{ {'method': 'get', 'owner': repo_owner,
          'repo': repo_name, 'pullNumber': pr_number} }}
      delegate_to: github-mcp-server
      loop: "{{ prs_needing_comments | default([]) }}"
      loop_control:
        loop_var: pr_number
        label: "PR #{{ pr_number }}"
      register: pr_details
      when: has_prs_needing_comments

    - name: Parse detailed PR results
      ansible.builtin.set_fact:
        pr_details_map: >-
          {{ pr_details_map | default({}) |
          combine({item.pr_number: item.content | parse_mcp_json}) }}
      loop: "{{ pr_details.results | default([]) }}"
      loop_control:
        label: "PR #{{ item.pr_number }}"
      when: pr_details is defined and not item.failed | default(false)

    - name: Only comment on PRs with successfully loaded details
      ansible.builtin.set_fact:
        prs_to_comment: "{{ (prs_needing_comments | default([])) | select('in', pr_details_map | default({})) | list }}"
        has_prs_to_comment: "{{ ((prs_needing_comments | default([])) | select('in', pr_details_map | default({})) | list | length) > 0 }}"
      when: has_prs_needing_comments

    # ============================================================================
    # Check Ocean Conditions (GitHub Platform Status)
    # ============================================================================
    - name: Check GitHub platform status using Fetch MCP
      ansible.mcp.run_tool:
        name: fetch
        args:
          url: https://www.githubstatus.com/api/v2/status.json
      delegate_to: mcp-server-fetch
      register: github_status
      failed_when: false
      when: has_prs_to_comment | default(false)

    - name: Extract and parse JSON from fetch response
      ansible.builtin.set_fact:
        platform_status: "{{ github_status.content | parse_mcp_json }}"
      when:
        - has_prs_to_comment | default(false)
        - github_status is defined
        - github_status.content is defined

    # ============================================================================
    # Get GitHub Zen Wisdom
    # ============================================================================
    - name: Get GitHub zen wisdom using Fetch MCP
      ansible.mcp.run_tool:
        name: fetch
        args:
          url: "https://api.github.com/zen"
      delegate_to: mcp-server-fetch
      register: zen_wisdom
      failed_when: false
      when: has_prs_to_comment | default(false)

    - name: Extract zen quote from response
      ansible.builtin.set_fact:
        # yamllint disable-line rule:line-length
        zen_quote: "{{ zen_wisdom.content[0].text.split('\n')[-1] if 'zen' in zen_wisdom.content[0].text else 'Keep swimming!' }}"
      when: has_prs_to_comment | default(false) and zen_wisdom.content is defined

    # ============================================================================
    # Post Migration Report Comment on Each PR
    # ============================================================================
    - name: Post migration status comment on PR
      ansible.mcp.run_tool:
        name: add_issue_comment
        args: >-
          {{ {'owner': repo_owner, 'repo': repo_name,
          'issue_number': pr_number, 'body': comment_body} }}
      delegate_to: github-mcp-server
      loop: "{{ prs_to_comment | default([]) }}"
      loop_control:
        loop_var: pr_number
        label: "PR #{{ pr_number }}"
      when: has_prs_to_comment | default(false) and pr_details_map is defined
      vars:
        updated_date: "{{ pr_details_map[pr_number].updated_at[:10] }}"
        days_adrift: >-
          {{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d ' +
          updated_date + ' +%s) ) / 86400 ))') }}
        comment_body: "{{ lookup('template', 'templates/pr_comment.j2') }}"

    # ============================================================================
    # Summary of All PRs
    # ============================================================================
    - name: Display summary of commented PRs
      ansible.builtin.debug:
        msg: |

          🦈 **Migration Summary** 🦈
          {{ prs_to_comment | default([]) | length }} PRs commented on

          {% for pr_num in prs_to_comment | default([]) %}
          • PR {{ pr_num }}: {{ pr_details_map[pr_num].title }}
          Status: {{ status_locations[
            pr_details_map[pr_num].mergeable_state
          ] | default('🌊 unknown') }}
          {{ pr_details_map[pr_num].html_url }}
          {% endfor %}
      when: has_prs_to_comment | default(false) and pr_details_map is defined
