---
- name: Whale Shark PR Migration Tracker
  hosts: localhost
  gather_facts: false
  vars_files:
    - vars.yml

  tasks:
    # ============================================================================
    # Find PRs Adrift (Search for stale pull requests)
    # ============================================================================
    - name: Find PRs adrift using GitHub MCP
      ansible.mcp.run_tool:
        name: search_pull_requests
        args:
          query: "repo:{{ repo_owner }}/{{ repo_name }} is:pr is:open -is:draft updated:<{{ threshold_date }}"
      delegate_to: github-mcp-server
      register: adrift_prs

    - name: Parse PR results
      ansible.builtin.set_fact:
        pr_list: "{{ adrift_prs.content | parse_mcp_json }}"
      when: adrift_prs.content is defined and adrift_prs.content | length > 0

    - name: Check if PRs were found
      ansible.builtin.set_fact:
        has_prs: "{{ pr_list is defined and pr_list.get('items', []) | length > 0 }}"

    - name: Display PRs adrift
      ansible.builtin.debug:
        msg: "🦈 {{ pr_list.get('items', []) | length }} PR(s) adrift (no updates in {{ days_adrift_threshold }} days)"

    # ============================================================================
    # Check for Existing Whale Shark Comments (Idempotency)
    # ============================================================================
    - name: Get existing comments on each PR using GitHub MCP
      ansible.mcp.run_tool:
        name: pull_request_read
        args: "{{ {'method': 'get_comments', 'owner': repo_owner, 'repo': repo_name, 'pullNumber': item.number} }}"
      delegate_to: github-mcp-server
      loop: "{{ pr_list.get('items', []) }}"
      loop_control:
        label: "PR #{{ item.number }}"
      register: pr_comments
      when: has_prs

    - name: Check if we've commented recently
      ansible.builtin.set_fact:
        prs_needing_comments: >-
          {{ prs_needing_comments | default([]) + [item.item.number] }}
      loop: "{{ pr_comments.results | default([]) }}"
      loop_control:
        label: "PR #{{ item.item.number }}"
      when:
        - pr_comments is defined
        - not item.failed | default(false)
        - needs_comment
      vars:
        comments_data: "{{ item.content | parse_mcp_json }}"
        whale_shark_comments: >-
          {{ comments_data |
             selectattr('body', 'search', '🦈.*Whale Shark PR Migration Status') |
             list }}
        recent_whale_shark_comments: >-
          {{ whale_shark_comments |
             selectattr('created_at', 'defined') |
             map(attribute='created_at') |
             select('>', comment_age_threshold_date) |
             list }}
        needs_comment: "{{ whale_shark_comments | length == 0 or recent_whale_shark_comments | length == 0 }}"

    - name: Check if any PRs need comments
      ansible.builtin.set_fact:
        has_prs_needing_comments: "{{ prs_needing_comments is defined and prs_needing_comments | length > 0 }}"

    - name: Display skipped PRs (already commented recently)
      ansible.builtin.debug:
        msg: "⏭️  Skipping {{ skipped_count }} PR(s) - already commented within the last {{ comment_freshness_days | abs }} day(s)"
      vars:
        total_prs: "{{ pr_list.get('items', []) | length }}"
        prs_needing: "{{ prs_needing_comments | default([]) | length }}"
        skipped_count: "{{ (total_prs | int) - (prs_needing | int) }}"
      when: has_prs and (skipped_count | int) > 0

    # ============================================================================
    # Get Detailed PR Information (including CI status)
    # ============================================================================
    - name: Get detailed PR information using GitHub MCP
      ansible.mcp.run_tool:
        name: pull_request_read
        args: "{{ {'method': 'get', 'owner': repo_owner, 'repo': repo_name, 'pullNumber': pr_number} }}"
      delegate_to: github-mcp-server
      loop: "{{ prs_needing_comments | default([]) }}"
      loop_control:
        loop_var: pr_number
        label: "PR #{{ pr_number }}"
      register: pr_details
      when: has_prs_needing_comments

    - name: Parse detailed PR results
      ansible.builtin.set_fact:
        pr_details_map: "{{ pr_details_map | default({}) | combine({item.pr_number: item.content | parse_mcp_json}) }}"
      loop: "{{ pr_details.results | default([]) }}"
      loop_control:
        label: "PR #{{ item.pr_number }}"
      when: pr_details is defined and not item.failed | default(false)

    # ============================================================================
    # Check Ocean Conditions (GitHub Platform Status)
    # ============================================================================
    - name: Check GitHub platform status using Fetch MCP
      ansible.mcp.run_tool:
        name: fetch
        args:
          url: https://www.githubstatus.com/api/v2/status.json
      delegate_to: mcp-server-fetch
      register: github_status
      failed_when: false
      when: has_prs_needing_comments

    - name: Extract and parse JSON from fetch response
      ansible.builtin.set_fact:
        platform_status: "{{ github_status.content | parse_mcp_json }}"
      when: has_prs_needing_comments and github_status is defined and github_status.content is defined

    # ============================================================================
    # Get GitHub Zen Wisdom
    # ============================================================================
    - name: Get GitHub zen wisdom using Fetch MCP
      ansible.mcp.run_tool:
        name: fetch
        args:
          url: "https://api.github.com/zen"
      delegate_to: mcp-server-fetch
      register: zen_wisdom
      failed_when: false
      when: has_prs_needing_comments

    - name: Extract zen quote from response
      ansible.builtin.set_fact:
        zen_quote: "{{ zen_wisdom.content[0].text | regex_search('Contents of https://api.github.com/zen:\\n(.+)$', '\\1') | first | default('Keep swimming!') }}"
      when: has_prs_needing_comments and zen_wisdom.content is defined

    # ============================================================================
    # Post Migration Report Comment on Each PR
    # ============================================================================
    - name: Post migration status comment on PR
      ansible.mcp.run_tool:
        name: add_issue_comment
        args: "{{ {'owner': repo_owner, 'repo': repo_name, 'issue_number': pr_number, 'body': comment_body} }}"
      delegate_to: github-mcp-server
      loop: "{{ prs_needing_comments | default([]) }}"
      loop_control:
        loop_var: pr_number
        label: "PR #{{ pr_number }}"
      when: has_prs_needing_comments and pr_details_map is defined
      vars:
        updated_date: "{{ pr_details_map[pr_number].updated_at[:10] }}"
        days_adrift: "{{ lookup('pipe', 'echo $(( ( $(date +%s) - $(date -d ' + updated_date + ' +%s) ) / 86400 ))') }}"
        comment_body: |
          🦈 **Whale Shark PR Migration Status** 🦈

          Your PR is migrating through the review ocean!

          Ocean Conditions: {{ ocean_conditions[platform_status.status.indicator] | default('Unknown ocean conditions') }}
          Current Location: {{ status_locations[pr_details_map[pr_number].mergeable_state] | default('🌊 unknown waters') }}
          Days adrift: 📅 {{ days_adrift }} days

          🦈 Whale Shark Wisdom:
            > _"{{ zen_quote | default('Keep swimming!') }}"_

          🧭 **Navigation Tips:**
          1. **Check your compass** - Read the CI failure logs
          2. **Test the waters** - Run tests locally before pushing
          3. **Ask the school** - Request review from your team

          ---
          _Whale sharks are the largest fish in the ocean and can migrate over 7,000 miles._
          _Your PR can make it through code review! Keep swimming! 🦈🌊_

    # ============================================================================
    # Summary of All PRs
    # ============================================================================
    - name: Display summary of commented PRs
      ansible.builtin.debug:
        msg: |

          🦈 **Migration Summary** 🦈
          {{ prs_needing_comments | default([]) | length }} PRs commented on

          {% for pr_num in prs_needing_comments | default([]) %}
          • PR {{ pr_num }}: {{ pr_details_map[pr_num].title }}
          Status: {{ status_locations[pr_details_map[pr_num].mergeable_state] | default('🌊 unknown') }}
          {{ pr_details_map[pr_num].html_url }}
          {% endfor %}
      when: has_prs_needing_comments and pr_details_map is defined
